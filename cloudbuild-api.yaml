steps:
  # 1. Build & Push API
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/synapse/api:latest', '-f', 'backend/Dockerfile', '.']

images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/synapse/api:latest'

substitutions:
  _REGION: us-central1
  _PROJECT_ID: synapse-488201
